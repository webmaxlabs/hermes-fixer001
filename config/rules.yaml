# inbox-watcher classification rules. Matched against "subject\nbody-snippet".
# Evaluated urgent -> notable -> ignore; first match wins.
# Tiers map to priority: urgent=P1, notable=P2; unmatched authenticated mail=P3.
urgent:
  - id: vercel_deploy_failed
    match: "(?i)(deployment .*failed|build failed|deploy(ment)? error)"
    description: Vercel deployment or build failed
    fix_hint: Reproduce the failing build locally, fix the compile/build error, keep the change minimal.
  - id: stripe_payment_failed
    match: "(?i)(payment failed|invoice payment failed|card was declined|subscription .*past due)"
    description: Stripe payment/subscription failure
  - id: stripe_key_or_account
    match: "(?i)(account .*restricted|api key .*(expired|revoked|rotated)|unable to process charges)"
    description: Stripe account/key problem
  - id: uptime_down
    match: "(?i)(is down|monitor .*down|site .*unreachable|service .*unavailable|incident opened)"  # TODO(task14): broad — tune against real mail
    description: Uptime monitor reports an outage
notable:
  - id: stripe_dispute
    match: "(?i)(dispute|chargeback)"
    description: Stripe dispute/chargeback opened
  - id: github_security_alert
    match: "(?i)(dependabot|security (alert|advisory|vulnerability)|known vulnerabilit)"
    description: GitHub security advisory / Dependabot
  - id: github_failed_workflow
    match: "(?i)(workflow run failed|run failed|ci .*failed|checks failed)"  # TODO(task14): broad — tune against real mail
    description: GitHub Actions workflow failure
    fix_hint: Run the failing CI job's command locally, fix the failing test or lint, do not edit the workflow file.
  - id: usage_or_billing
    match: "(?i)(usage .*(limit|exceeded)|billing|spending limit|over your plan)"  # TODO(task14): broad — tune against real mail
    description: Billing / usage threshold
ignore:
  - "(?i)unsubscribe"
  - "(?i)(newsletter|product update|what's new|weekly digest)"
  - "(?i)(receipt|thanks for your payment|payment succeeded)"
