# inbox-watcher classification rules. Matched against "subject\nbody-snippet".
# Evaluated urgent -> notable -> ignore; first match wins (and in file order within a tier).
# Tiers map to priority: urgent=P1, notable=P2; unmatched authenticated mail=P3.
#
# CONTRACT: the only mail that arrives is fleet relays (alerts@webmaxlabs.com relaying the
# watcher fleet). Rules match the watchers' actual subjects. We do NOT keep rules for sources
# with no live feed — no native vercel.com/stripe.com/github.com mail ever arrives, so such
# rules can never fire and only create false confidence. New classes arrive WITH their source
# (self-healing program P2 adds client_error + payment_failed once those feeds exist).
# Specific rules first (distinct rule_id => distinct error_signature + fix_hint); catch-all last.
urgent:
  - id: fleet_auth_failure
    match: '(?i)\[urgent\].*(?:\b401\b|\b403\b|\[auth\]|invalidcheck|unauthorized|forbidden)'
    description: Fleet escalation — auth/permission failure
    fix_hint: Trace the 401/403 to the failing call; fix the missing or expired credential, token, or auth check. Never weaken auth to silence it.
  - id: fleet_db_integrity
    match: '(?i)\[urgent\].*(?:duplicate key|unique constraint|integrity ?error|constraint violation)'
    description: Fleet escalation — database integrity/constraint error
    fix_hint: Make the write idempotent (upsert or conflict-handling); respect the unique constraint rather than removing it.
    fixer: true
  - id: fleet_site_down
    match: '(?i)\[urgent\].*uptime-watcher.*\bdown\b'
    description: Fleet escalation — monitored site/endpoint is DOWN
  - id: fleet_cert_expiry
    match: '(?i)\[urgent\].*cert_expiry'
    description: Fleet escalation — SSL certificate expired or expiring imminently
  - id: fleet_urgent
    match: '(?i)\[urgent\].*watcher'
    description: Fleet escalation (uncategorized urgent)
    fix_hint: Investigate the error named in the alert subject for the named project; reproduce and fix the root cause with a minimal change.
notable:
  - id: fleet_cert_expiry_warn
    match: '(?i)uptime-watcher.*cert_expiry'
    description: SSL certificate expiring within the warning window
ignore:
  - "(?i)unsubscribe"
  - "(?i)(newsletter|product update|what's new|weekly digest)"
  - "(?i)(receipt|thanks for your payment|payment succeeded)"
